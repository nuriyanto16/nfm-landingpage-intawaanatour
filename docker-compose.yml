services:
  # ------------------------------------------------------------------
  # Aplikasi Intawaanatour (CodeIgniter 4)
  # ------------------------------------------------------------------
  app:
    build: ./Intawaanatour
    container_name: intawaanatour_app
    ports:
      - "8082:80"
    volumes:
      - ./Intawaanatour:/var/www/html
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Default = development (untuk lokal). Di VPS, set via file .env (root)
      # supaya tidak perlu mengubah file ini:
      #   CI_ENVIRONMENT=production
      #   APP_BASE_URL=https://nfmtech.my.id/landingpage/intawaantour/
      - CI_ENVIRONMENT=${CI_ENVIRONMENT:-development}
      # baseURL HARUS lengkap dengan sub-path agar redirect (mis. /admin ->
      # /admin/login) tidak kehilangan prefix & tidak turun ke http di balik
      # reverse-proxy nginx. CI4 memetakan env "app.baseURL" -> Config\App::$baseURL.
      - app.baseURL=${APP_BASE_URL:-http://localhost:8082/}
    restart: unless-stopped

  # ------------------------------------------------------------------
  # MariaDB bersama untuk seluruh project di workspace ini.
  # Data dibind ke ./mariadb/data (di luar folder project) agar bisa
  # dipakai lintas project dan tetap persisten.
  # ------------------------------------------------------------------
  db:
    image: mariadb:10.11
    container_name: workspace_db
    ports:
      - "3307:3306"
    environment:
      MARIADB_DATABASE: intawaanatour
      MARIADB_USER: intawaana
      MARIADB_PASSWORD: intawaana_pass
      MARIADB_ROOT_PASSWORD: root_pass
    volumes:
      - ./mariadb/data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped
